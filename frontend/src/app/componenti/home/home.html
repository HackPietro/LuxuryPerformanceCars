<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<div class="container">
  <!-- Contenitore logo con immagine di sfondo -->
  <div class="logo-container">
    <img src="assets/logo.png" alt="Logo" class="logo-img">
  </div>

  <!-- Contenitore icona menu e Wishlist in alto a destra -->
  <div class="menu-icon-container">
    <!-- Pulsante Wishlist con icona cuore -->
    <button class="fab-button-3" *ngIf="auth.isLoggedIn$ | async" title="Wishlist"
            onClick="window.open('http://localhost:4200/wishlist', '_self')"
            style="text-decoration: none;">
      <i class="fa-solid fa-heart heart-icon"></i>
    </button>

    <!-- Menu di autenticazione -->
    <button class="icon-button menu-trigger" [matMenuTriggerFor]="menu">
      <i class="fa-solid fa-user icon-user"></i>
    </button>
  </div>

  <!-- Contenitore di autenticazione e pulsanti -->
  <div class="authentication-container">
    <button class="transparent-button" title="Clicca qui per il parco auto"
            routerLink="/parco_auto">
      Clicca qui per il parco auto
    </button>
  </div>

  <!-- Menu di autenticazione per il pulsante con i tre puntini -->
  <mat-menu #menu="matMenu">
    <button mat-menu-item onClick="window.open('http://localhost:8080/login', '_self')" *ngIf="!(auth.isLoggedIn$ | async)">
      <i class="fa-solid fa-lock menu-icon"></i>
      <span>Accedi</span>
    </button>
    <button mat-menu-item onClick="window.open('http://localhost:8080/registration', '_self')" *ngIf="!(auth.isLoggedIn$ | async)">
      <i class="fa-solid fa-user-plus menu-icon"></i>
      <span>Registrati</span>
    </button>
    <button mat-menu-item *ngIf="auth.isLoggedIn$ | async" routerLink="profilo">
      <i class="fa-solid fa-user menu-icon"></i>
      <span style="font-size: 15px;">Profilo</span>
    </button>
    <button mat-menu-item *ngIf="(auth.isLoggedIn$ | async) && auth.isAdmin()" routerLink="analisi_dei_dati">
      <i class="fa-solid fa-chart-bar menu-icon"></i>
      <span style="font-size: 15px;">Analisi dei dati</span>
    </button>
    <button mat-menu-item *ngIf="(auth.isLoggedIn$ | async) && auth.isAdmin()" routerLink="gestione_auto">
      <i class="fa-solid fa-car menu-icon"></i>
      <span style="font-size: 15px;">Gestione Auto</span>
    </button>
    <button mat-menu-item *ngIf="(auth.isLoggedIn$ | async) && auth.isAdmin()" routerLink="gestione_utenti">
      <i class="fa-solid fa-users-cog menu-icon"></i>
      <span style="font-size: 15px;">Gestione Utenti</span>
    </button>
    <button mat-menu-item *ngIf="auth.isLoggedIn$ | async" (click)="auth.logout()" routerLink="home">
      <i class="fa-solid fa-right-from-bracket menu-icon"></i>
      <span style="font-size: 15px;">Esci</span>
    </button>
  </mat-menu>
</div>
