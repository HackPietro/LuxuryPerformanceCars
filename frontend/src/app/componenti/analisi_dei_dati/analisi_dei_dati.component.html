<div class="background">
  <div class="analisi-container">
    <h1>Analisi dei dati</h1>

    <!-- Dropdown per selezionare il grafico -->
    <div class="dropdown-container">
      <label for="chart-select">Seleziona Grafico:</label>
      <select id="chart-select" (change)="onChartSelect($event)">
        <option value="" selected disabled>Seleziona un grafico</option>
        <option value="barChartMin">Prezzi minimi ricercati dagli utenti</option>
        <option value="barChartMax">Prezzi massimi ricercati dagli utenti</option>
        <option value="pieChartDoors">Numero di porte ricercate dagli utenti</option>
        <option value="pieChartNeoDrivers">Neopatentati</option>
        <option value="barChartBrands">Marche ricercate dagli utenti</option>
        <option value="stackedBarChartBrandModels">Modelli ricercati dagli utenti</option>
        <option value="barChartMinKm">Km minimi ricercati dagli utenti</option>
        <option value="barChartMaxKm">Km massimi ricercati dagli utenti</option>
        <option value="barChartYearFrom">Anni di immatricolazione minimi ricercati dagli utenti</option>
        <option value="barChartYearTo">Anni di immatricolazione massimi ricercati dagli utenti</option>
        <option value="pieChartCambio">Tipi di cambi ricercati dagli utenti</option>
        <option value="barChartCarburante">Tipi di carburanti ricercati dagli utenti</option>
        <option value="barChartCategoria">Categorie di auto ricercate dagli utenti</option>
        <option value="stackedBarClickCount">Numero di click per auto</option>
        <option value="stackedBarSuccessoVendita">Probabilità di vendita per auto</option>
      </select>
    </div>

    <!-- Dropdown per selezionare la marca -->
    <div class="dropdown-container" *ngIf="showBrandSelector">
      <label for="brand-select">Seleziona Marca:</label>
      <select id="brand-select" (change)="onBrandSelect($event)">
        <option value="" selected disabled>Seleziona una marca</option>
        <option *ngFor="let brand of brands" [value]="brand">{{ brand }}</option>
      </select>
    </div>

    <div class="dropdown-container" *ngIf="showBrandModelSelector">
      <label for="model-select">Seleziona Modello:</label>
      <select id="model-select" (change)="onModelSelect($event)">
        <option value="" selected disabled>Seleziona un modello</option>
        <option *ngFor="let model of models" [value]="model">{{ model }}</option>
      </select>
    </div>

    <div class="dropdown-container" *ngIf="showIdSelector">
      <label for="id-select">Seleziona ID:</label>
      <select id="id-select" (change)="onIdSelect($event)">
        <option value="" selected disabled>Seleziona un ID</option>
        <option *ngFor="let id of ids" [value]="id">{{ id }}</option>
      </select>
    </div>


    <!-- Container per i grafici -->
    <div class="charts-wrapper">
      <div class="chart-container" id="barChartMin-container">
        <canvas id="barChartMin"></canvas>
      </div>
      <div class="chart-container" id="barChartMax-container">
        <canvas id="barChartMax"></canvas>
      </div>
      <div class="chart-container" id="pieChartDoors-container">
        <canvas id="pieChartDoors"></canvas>
      </div>
      <div class="chart-container" id="pieChartNeoDrivers-container">
        <canvas id="pieChartNeoDrivers"></canvas>
      </div>
      <div class="chart-container" id="barChartBrands-container">
        <canvas id="barChartBrands"></canvas>
      </div>
      <div class="chart-container" id="stackedBarChartBrandModels-container">
        <canvas id="stackedBarChartBrandModels"></canvas>
      </div>
      <div class="chart-container" id="barChartMinKm-container">
        <canvas id="barChartMinKm"></canvas>
      </div>
      <div class="chart-container" id="barChartMaxKm-container">
        <canvas id="barChartMaxKm"></canvas>
      </div>
      <div class="chart-container" id="barChartYearFrom-container">
        <canvas id="barChartYearFrom"></canvas>
      </div>
      <div class="chart-container" id="barChartYearTo-container">
        <canvas id="barChartYearTo"></canvas>
      </div>
      <div class="chart-container" id="pieChartCambio-container">
        <canvas id="pieChartCambio"></canvas>
      </div>
      <div class="chart-container" id="barChartCarburante-container">
        <canvas id="barChartCarburante"></canvas>
      </div>
      <div class="chart-container" id="barChartCategoria-container">
        <canvas id="barChartCategoria"></canvas>
      </div>
      <div class="chart-container" id="stackedBarClickCount-container">
        <canvas id="stackedBarClickCount"></canvas>
      </div>
      <div class="chart-container" id="stackedBarSuccessoVendita-container">
        <canvas id="stackedBarSuccessoVendita"></canvas>
      </div>
    </div>
  </div>
</div>
